<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Family Feud – Host</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
body[data-theme="classic"]{--bg:#00061a;--surface:#010d2e;--card:#001855;--card2:#002580;--border:rgba(255,255,255,.08);--border-gold:rgba(255,204,0,.25);--text:#fff;--muted:rgba(255,255,255,.45);--gold:#FFCC00;--gold-dim:#B38F00;--red:#E53935;--green:#2E7D32;--accent:#7C6AFA}
body[data-theme="day"]{--bg:#f0f4ff;--surface:#e4eaf8;--card:#fff;--card2:#dbe4ff;--border:rgba(0,0,0,.1);--border-gold:rgba(180,130,0,.3);--text:#111;--muted:#666;--gold:#c49a00;--gold-dim:#8a6d00;--red:#d32f2f;--green:#2e7d32;--accent:#5c6bc0}
body[data-theme="canva"]{--bg:#1a0533;--surface:#2a0845;--card:#3d0d60;--card2:#5512a0;--border:rgba(255,255,255,.1);--border-gold:rgba(255,100,200,.3);--text:#fff;--muted:rgba(255,255,255,.5);--gold:#ff6ec7;--gold-dim:#cc4a9e;--red:#ff3864;--green:#00d97e;--accent:#00c8ff}
body[data-theme="midnight"]{--bg:#000;--surface:#0a0a0a;--card:#111;--card2:#1a1a1a;--border:rgba(255,255,255,.07);--border-gold:rgba(255,204,0,.2);--text:#f5f5f5;--muted:rgba(255,255,255,.4);--gold:#FFD700;--gold-dim:#B8860B;--red:#ff1744;--green:#00e676;--accent:#e040fb}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
button{font-family:'Cairo',sans-serif;cursor:pointer;border:none;outline:none;transition:all .18s}
input,select{font-family:'Cairo',sans-serif;outline:none}
/* layout */
.topbar{background:var(--card);border-bottom:2px solid var(--gold);padding:10px 18px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;position:sticky;top:0;z-index:60}
.logo{display:flex;align-items:center;gap:8px}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--gold),var(--gold-dim));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1.2rem}
.logo-name{font-size:1rem;font-weight:900;color:var(--gold)}
.logo-sub{font-size:.65rem;color:var(--muted)}
.topbar-right{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.tabs{display:flex;gap:3px;padding:11px 18px 0;background:var(--card);border-bottom:1px solid var(--border)}
.tab{padding:8px 16px;border-radius:9px 9px 0 0;font-size:.82rem;font-weight:700;color:var(--muted);background:transparent;border:1px solid transparent;border-bottom:none}
.tab.on{color:var(--gold);background:var(--surface);border-color:var(--border)}
.tab:hover:not(.on){color:var(--text)}
.body{padding:16px;max-width:1200px;width:100%;margin:0 auto}
/* buttons */
.btn{padding:8px 14px;border-radius:8px;font-size:.82rem;font-weight:700;transition:all .18s}
.btn:hover{transform:translateY(-2px)}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-dim));color:#000}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted)}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold)}
.btn-red{background:rgba(229,57,53,.2);border:1px solid rgba(229,57,53,.35);color:#ef9a9a}
.btn-red:hover{background:rgba(229,57,53,.35)}
.btn-sm{padding:5px 10px;font-size:.76rem}
/* cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px}
/* game layout */
.game-layout{display:grid;grid-template-columns:1fr 300px;gap:12px;align-items:start}
/* score */
.score-row{display:flex;gap:8px;margin-bottom:8px}
.score-box{flex:1;background:var(--card2);border-radius:8px;padding:10px;text-align:center;border:2px solid transparent}
.score-box.active{border-color:var(--gold)}
.sb-name{font-size:.75rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-pts{font-size:1.8rem;font-weight:900}
.bank-box{background:#000;border:2px solid var(--gold);border-radius:8px;padding:8px 14px;text-align:center;flex-shrink:0}
.bank-lbl{font-size:.6rem;color:var(--gold);letter-spacing:2px}
.bank-pts{font-size:1.8rem;font-weight:900}
/* phase badge */
.phase-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:16px;font-size:.76rem;font-weight:700;border:1px solid;margin-bottom:8px}
/* question */
.q-box{background:var(--card2);border:2px solid var(--gold);border-radius:9px;padding:10px 14px;margin-bottom:8px}
.q-text{font-size:1rem;font-weight:700}
.q-vis{font-size:.7rem;color:var(--muted);margin-top:3px}
/* host board */
.host-board{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.ht{background:var(--card2);border:1.5px solid var(--border);border-radius:7px;padding:8px 10px;display:flex;align-items:center;gap:7px;cursor:pointer;transition:all .18s;min-height:50px}
.ht:hover:not(.revealed){border-color:var(--gold);background:rgba(255,204,0,.06)}
.ht.revealed{background:rgba(46,125,50,.15);border-color:#3d9140;cursor:default}
.ht.fo-sel{border-color:#ff9800;background:rgba(255,152,0,.12)}
.ht-n{width:24px;height:24px;border-radius:6px;background:rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:900;color:var(--gold);flex-shrink:0}
.ht.revealed .ht-n{background:rgba(61,145,64,.25)}
.ht-txt{flex:1;font-size:.88rem;font-weight:700}
.ht-pts{background:var(--gold);color:#000;font-weight:900;font-size:.8rem;padding:2px 8px;border-radius:12px;flex-shrink:0}
/* strikes */
.strikes-row{display:flex;gap:6px;margin-bottom:8px}
.sx{width:40px;height:40px;border-radius:9px;border:2px solid rgba(220,50,50,.2);background:rgba(200,0,0,.06);display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:900;color:transparent;transition:all .3s}
.sx.lit{color:var(--red);border-color:var(--red);background:rgba(229,57,53,.18);text-shadow:0 0 14px rgba(255,0,0,.7)}
/* ctrl sections */
.ctrl{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:11px;margin-bottom:8px}
.ctrl-title{font-size:.67rem;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.ctrl-btns{display:flex;gap:6px;flex-wrap:wrap}
.cb{padding:8px 13px;border-radius:7px;font-size:.82rem;font-weight:700;transition:all .18s}
.cb:hover{transform:translateY(-2px)}
.cb-gold{background:linear-gradient(135deg,var(--gold),var(--gold-dim));color:#000}
.cb-red{background:var(--red);color:#fff}
.cb-green{background:var(--green);color:#fff}
.cb-blue{background:var(--card2);color:var(--text);border:1px solid var(--border)}
.cb-gray{background:rgba(255,255,255,.1);color:var(--text)}
.cb-orange{background:#e65100;color:#fff}
.cb-accent{background:var(--accent);color:#fff}
.cb-danger{background:rgba(229,57,53,.15);border:1px solid rgba(229,57,53,.4);color:#ef9a9a}
/* faceoff */
.fo-panel{background:var(--card);border:1px solid var(--border-gold);border-radius:9px;padding:11px;margin-bottom:8px}
.fo-slot{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:7px;padding:9px;margin-bottom:6px}
.fo-slot:last-child{margin-bottom:0}
.fo-name{font-size:.86rem;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:5px}
.fo-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.fo-btns{display:flex;flex-wrap:wrap;gap:4px}
.fo-btn{padding:5px 9px;border-radius:6px;font-size:.74rem;font-weight:700;background:rgba(255,255,255,.07);color:var(--text);border:1px solid var(--border)}
.fo-btn:hover{border-color:var(--gold);color:var(--gold)}
.fo-btn.sel{background:rgba(255,204,0,.15);border-color:var(--gold);color:var(--gold)}
.fo-btn.wrong{background:rgba(229,57,53,.15);border-color:var(--red);color:#ef9a9a}
/* sidebar */
.players-panel{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:11px;margin-bottom:8px}
.pl-item{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.03);border-radius:6px;padding:6px 8px;margin-top:5px}
.pl-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.pl-name{font-size:.8rem;font-weight:700;flex:1}
.pl-team{font-size:.67rem;color:var(--muted)}
/* questions tab */
.ql{display:flex;gap:12px;flex-wrap:wrap}
.q-sidebar{width:230px;flex-shrink:0}
.q-main{flex:1;min-width:250px}
.q-item{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:8px 10px;display:flex;align-items:center;gap:6px;cursor:pointer;margin-bottom:5px}
.q-item:hover{border-color:var(--accent)}
.q-item.sel{border-color:var(--gold);background:rgba(255,204,0,.05)}
.qi-n{width:22px;height:22px;border-radius:5px;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:900;color:var(--gold);flex-shrink:0}
.q-item.sel .qi-n{background:var(--gold);color:#000}
.qi-txt{flex:1;font-size:.75rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.q-item.sel .qi-txt{color:var(--text)}
.qi-del{width:18px;height:18px;border-radius:4px;background:transparent;border:1px solid rgba(239,83,80,.22);color:rgba(239,83,80,.45);font-size:.66rem;display:flex;align-items:center;justify-content:center}
.qi-del:hover{background:rgba(239,83,80,.14);color:#ef5350;border-color:#ef5350}
.add-q{width:100%;margin-top:6px;background:rgba(124,106,250,.12);border:1px dashed rgba(124,106,250,.35);color:var(--accent);border-radius:7px;padding:7px;font-size:.78rem;font-weight:700}
.einput{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:.9rem;padding:8px 11px;direction:rtl}
.einput:focus{border-color:var(--accent);outline:none}
.pts-inp{background:rgba(255,204,0,.06);border-color:rgba(255,204,0,.22);color:var(--gold);text-align:center;font-weight:700;width:72px}
.ans-row{display:grid;grid-template-columns:22px 1fr 72px 26px;gap:5px;align-items:center;margin-bottom:5px}
.ans-n{width:22px;height:22px;border-radius:5px;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:900;color:var(--gold)}
.ans-del{width:26px;height:26px;border-radius:5px;background:transparent;border:1px solid rgba(239,83,80,.2);color:rgba(239,83,80,.42);font-size:.82rem;display:flex;align-items:center;justify-content:center}
.ans-del:hover{background:rgba(239,83,80,.14);color:#ef5350;border-color:#ef5350}
.pts-bar{display:flex;align-items:center;justify-content:space-between;padding-top:8px;border-top:1px solid var(--border);margin-top:5px;font-size:.75rem}
.pv{font-weight:900}.pv.ok{color:#66bb6a}.pv.warn{color:#ffa726}.pv.over{color:#ef5350}
.save-btn{width:100%;background:linear-gradient(135deg,var(--gold),var(--gold-dim));color:#000;font-size:.9rem;font-weight:900;padding:9px;border-radius:8px;margin-top:4px}
/* settings */
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px}
.sc{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:14px}
.sc-t{font-size:.74rem;font-weight:700;color:var(--gold);letter-spacing:1px;margin-bottom:11px}
.srow{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:9px}
.srow:last-child{margin-bottom:0}
.srl{font-size:.84rem}
.tog{width:38px;height:21px;background:rgba(255,255,255,.1);border-radius:11px;position:relative;cursor:pointer;transition:background .3s;flex-shrink:0}
.tog.on{background:var(--accent)}
.tog::after{content:'';position:absolute;top:3px;right:3px;width:15px;height:15px;background:#fff;border-radius:50%;transition:transform .3s}
.tog.on::after{transform:translateX(-17px)}
/* teams */
.teams-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.te{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:13px}
.te-head{display:flex;align-items:center;gap:7px;margin-bottom:9px}
.te-color{width:30px;height:30px;border-radius:7px;border:2px solid rgba(255,255,255,.2);cursor:pointer}
.te-name{flex:1;background:transparent;border:none;color:var(--text);font-size:.94rem;font-weight:900;border-bottom:1px solid transparent;direction:rtl;padding:2px 0}
.te-name:focus{outline:none;border-color:var(--gold)}
/* share */
.share-box{background:rgba(255,204,0,.06);border:1px dashed var(--border-gold);border-radius:8px;padding:9px 12px;margin-bottom:10px}
.share-url{font-size:.8rem;color:var(--gold);font-weight:700;word-break:break-all}
/* danger */
.danger{background:rgba(229,57,53,.06);border:1px dashed rgba(229,57,53,.25);border-radius:9px;padding:10px;margin-top:6px}
.danger-title{font-size:.63rem;font-weight:700;color:rgba(239,83,80,.6);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
/* conn */
.conn{display:flex;align-items:center;gap:5px;font-size:.72rem;color:var(--muted)}
.conn-dot{width:7px;height:7px;border-radius:50%;background:#555}
.conn-dot.on{background:#4caf50}.conn-dot.err{background:var(--red)}
/* toast */
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--card);border:1px solid rgba(102,187,106,.35);border-radius:9px;padding:8px 18px;font-size:.82rem;color:#66bb6a;font-weight:700;opacity:0;transition:all .3s;z-index:999;pointer-events:none}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{border-color:rgba(239,83,80,.35);color:#ef5350}
@media(max-width:700px){.game-layout{grid-template-columns:1fr}.host-board{grid-template-columns:1fr}.teams-grid{grid-template-columns:1fr}.ql{flex-direction:column}.q-sidebar{width:100%}}
</style>
</head>
<body data-theme="classic">

<div class="topbar">
  <div class="logo">
    <div class="logo-icon">🎯</div>
    <div><div class="logo-name">Family Feud</div><div class="logo-sub">لوحة الهوست</div></div>
  </div>
  <div class="topbar-right">
    <div class="conn"><div class="conn-dot" id="conn-dot"></div><span id="conn-lbl">غير متصل</span></div>
    <button class="btn btn-ghost btn-sm" onclick="importJSON()">📥</button>
    <button class="btn btn-ghost btn-sm" onclick="exportJSON()">📤</button>
    <button class="btn btn-gold btn-sm" onclick="window.open(location.origin+'/tv.html','_blank')">📺 TV</button>
  </div>
</div>

<div class="tabs">
  <button class="tab on"  id="tab-btn-game"      onclick="switchTab('game',this)">🎮 اللعبة</button>
  <button class="tab"     id="tab-btn-questions"  onclick="switchTab('questions',this)">📋 الأسئلة</button>
  <button class="tab"     id="tab-btn-teams"      onclick="switchTab('teams',this)">👥 الفرق</button>
  <button class="tab"     id="tab-btn-settings"   onclick="switchTab('settings',this)">⚙️ الإعدادات</button>
</div>

<div class="body">

<!-- ═══ GAME TAB ═══ -->
<div id="tab-game">
  <div class="share-box">
    <div style="font-size:.64rem;color:var(--muted);margin-bottom:3px">📱 رابط اللاعبين</div>
    <div class="share-url" id="share-url">—</div>
    <button class="btn btn-ghost btn-sm" style="margin-top:5px" onclick="navigator.clipboard.writeText(document.getElementById('share-url').textContent).then(()=>toast('تم النسخ ✓'))">نسخ</button>
  </div>

  <div class="game-layout">
    <div>
      <div id="phase-badge" class="phase-badge" style="background:rgba(255,204,0,.1);border-color:rgba(255,204,0,.3);color:var(--gold)">⏳ الإعداد</div>
      <div class="score-row" id="score-row"></div>
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
        <div class="bank-box" style="flex:1"><div class="bank-lbl">البنك</div><div class="bank-pts" id="bank-val">0</div></div>
        <div style="text-align:center"><div style="font-size:.63rem;color:var(--muted)">الجولة</div><div style="font-size:1.2rem;font-weight:900" id="round-disp">—</div></div>
      </div>
      <div class="q-box" id="q-box" style="display:none">
        <div class="q-text" id="q-text"></div>
        <div class="q-vis" id="q-vis"></div>
        <button class="btn btn-ghost btn-sm" style="margin-top:6px" id="toggle-q-btn" onclick="send({type:'host_toggle_question'})">👁 إظهار للجمهور</button>
      </div>
      <div class="host-board" id="host-board"></div>
      <div class="strikes-row" id="strikes-row"></div>
      <div id="ctrl-area"></div>
      <div id="danger-area"></div>
    </div>
    <div>
      <div class="players-panel">
        <div style="font-size:.67rem;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase">المتصلون (<span id="pl-count">0</span>)</div>
        <div id="pl-list"><div style="font-size:.78rem;color:var(--muted);text-align:center;padding:10px;margin-top:5px">لا يوجد لاعبون</div></div>
      </div>
      <div class="card">
        <div style="font-size:.67rem;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:7px">اختر الجولة</div>
        <div id="round-btns" style="display:flex;flex-wrap:wrap;gap:5px"></div>
      </div>
    </div>
  </div>
</div>

<!-- ═══ QUESTIONS TAB ═══ -->
<div id="tab-questions" style="display:none">
  <div class="ql">
    <div class="q-sidebar">
      <div style="font-size:.67rem;font-weight:700;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">الأسئلة (<span id="q-count">0</span>)</div>
      <div id="q-items"></div>
      <button class="add-q" onclick="addQ()">＋ سؤال جديد</button>
    </div>
    <div class="q-main" id="q-editor">
      <div style="height:160px;display:flex;align-items:center;justify-content:center;color:var(--muted);background:var(--card);border:1px solid var(--border);border-radius:9px">اختر سؤالاً أو أنشئ جديداً 👈</div>
    </div>
  </div>
</div>

<!-- ═══ TEAMS TAB ═══ -->
<div id="tab-teams" style="display:none">
  <div class="teams-grid" id="teams-grid"></div>
  <div style="margin-top:10px;display:flex;gap:7px">
    <button class="btn btn-gold" onclick="saveTeams()">💾 حفظ الفرق</button>
    <button class="btn btn-red btn-sm" onclick="if(confirm('تصفير؟'))send({type:'host_reset_game'})">تصفير النقاط</button>
  </div>
</div>

<!-- ═══ SETTINGS TAB ═══ -->
<div id="tab-settings" style="display:none">
  <div class="sg">
    <div class="sc">
      <div class="sc-t">🎨 الثيم</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button style="padding:7px 12px;border-radius:7px;font-size:.78rem;font-weight:700;border:2px solid;background:#00061a;color:#FFCC00;border-color:#FFCC00" onclick="setTheme('classic')">Classic</button>
        <button style="padding:7px 12px;border-radius:7px;font-size:.78rem;font-weight:700;border:2px solid transparent;background:#f0f4ff;color:#333" onclick="setTheme('day')">☀️ نهاري</button>
        <button style="padding:7px 12px;border-radius:7px;font-size:.78rem;font-weight:700;border:2px solid transparent;background:linear-gradient(135deg,#1a0533,#5512a0);color:#ff6ec7" onclick="setTheme('canva')">🎨 Canva</button>
        <button style="padding:7px 12px;border-radius:7px;font-size:.78rem;font-weight:700;border:2px solid;background:#000;color:#FFD700;border-color:#FFD700" onclick="setTheme('midnight')">🌙 Midnight</button>
      </div>
    </div>
    <div class="sc">
      <div class="sc-t">🔊 مؤثرات</div>
      <div class="srow">
        <div class="srl">أصوات اللعبة</div>
        <div class="tog on" id="tog-sounds" onclick="CFG.soundEnabled=!CFG.soundEnabled;this.classList.toggle('on',CFG.soundEnabled);saveData()"></div>
      </div>
    </div>
    <div class="sc">
      <div class="sc-t">📤 بيانات</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="btn btn-ghost btn-sm" onclick="importJSON()">📥 استيراد</button>
        <button class="btn btn-ghost btn-sm" onclick="exportJSON()">📤 تصدير</button>
        <button class="btn btn-red btn-sm" onclick="if(confirm('مسح كل الأسئلة؟')){QS=[];selQ=0;saveData();renderQList();send({type:'host_set_questions',questions:[]});toast('تم المسح')}">🗑 مسح</button>
      </div>
    </div>
  </div>
</div>

</div>
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════
// DATA
// ══════════════════════════════════════
const WS_URL = (location.protocol==='https:'?'wss://':'ws://')+location.host+'/ws';
let CFG   = JSON.parse(localStorage.getItem('ff_cfg')||'null') || {soundEnabled:true,theme:'classic'};
let QS    = JSON.parse(localStorage.getItem('ff_qs') ||'null') || [
  {q:'سمّوا شيئاً تشربه في الصباح؟',answers:[{t:'قهوة',p:40},{t:'شاي',p:30},{t:'حليب',p:15},{t:'عصير',p:10},{t:'ماء',p:5}]}
];
let TEAMS = JSON.parse(localStorage.getItem('ff_teams')||'null') || [
  {name:'الفريق الأزرق',color:'#2979FF'},
  {name:'الفريق الأحمر',color:'#E53935'}
];
let selQ = 0;
// Server state - starts as null, gets populated from server
let GS = null;

// ══════════════════════════════════════
// WEBSOCKET
// ══════════════════════════════════════
let ws, _ping=null;

function connect(){
  ws = new WebSocket(WS_URL);
  ws.onopen = ()=>{
    setConn(true);
    send({type:'host_join'});
    clearInterval(_ping);
    _ping = setInterval(()=>{ if(ws&&ws.readyState===1) send({type:'ping'}); },25000);
  };
  ws.onclose = ()=>{ setConn(false); clearInterval(_ping); setTimeout(connect,3000); };
  ws.onerror = ()=>{ setConn(false); };
  ws.onmessage = e=>{ try{ onMsg(JSON.parse(e.data)); }catch(err){ console.error('MSG ERR',err); } };
}

function send(o){ if(ws&&ws.readyState===1) ws.send(JSON.stringify(o)); }

function setConn(ok){
  document.getElementById('conn-dot').className='conn-dot'+(ok?' on':' err');
  document.getElementById('conn-lbl').textContent=ok?'متصل':'غير متصل';
}

function syncToServer(){
  send({type:'host_set_questions', questions:QS});
  send({type:'host_set_teams',     teams:TEAMS});
  send({type:'host_set_theme',     theme:CFG.theme||'classic'});
}

function onMsg(m){
  if(m.type==='state'){
    GS = m;
    renderGame();
    renderPlayers(m.players||[]);
  }
  else if(m.type==='players_update'){
    renderPlayers(m.players||[]);
  }
  else if(m.type==='request_sync'){
    syncToServer();
  }
}

// ══════════════════════════════════════
// TABS
// ══════════════════════════════════════
function switchTab(name,btn){
  ['game','questions','teams','settings'].forEach(t=>{
    document.getElementById('tab-'+t).style.display = t===name?'':'none';
  });
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
}

// ══════════════════════════════════════
// GAME RENDER
// ══════════════════════════════════════
const PHASE_LABEL = {
  setup:'⏳ الإعداد', faceoff:'🎯 المواجهة', playpass:'🤔 Play أو Pass',
  playing:'▶ يلعب', steal:'🔴 السرقة', end_round:'✅ نهاية الجولة', game_over:'🏆 نهاية اللعبة'
};
const PHASE_COLOR = {
  setup:'rgba(255,204,0,.1)', faceoff:'rgba(124,106,250,.15)',
  playpass:'rgba(229,152,0,.15)', playing:'rgba(46,125,50,.15)',
  steal:'rgba(229,57,53,.15)', end_round:'rgba(76,175,80,.12)', game_over:'rgba(255,204,0,.15)'
};

function renderGame(){
  if(!GS) return;
  const ph    = GS.phase || 'setup';
  const teams = GS.teams  || TEAMS;
  const scores= GS.scores || [0,0];
  const tiles = GS.board_tiles || [];
  // All questions: use LOCAL QS as primary (always up-to-date), fallback to server
  const questions = QS.length ? QS : (GS.questions||[]);

  // Phase badge
  const pb = document.getElementById('phase-badge');
  pb.textContent = PHASE_LABEL[ph]||ph;
  pb.style.background = PHASE_COLOR[ph]||'';
  pb.style.borderColor = ph==='playing'?teams[GS.active_team||0]?.color:'rgba(255,204,0,.3)';

  // Scores
  const sr = document.getElementById('score-row');
  const at = GS.active_team||0;
  sr.innerHTML = `
    ${teams.map((t,i)=>`
      <div class="score-box${i===at?' active':''}" style="border-color:${i===at?t.color:'transparent'}">
        <div class="sb-name" style="color:${t.color}">${esc(t.name)}</div>
        <div class="sb-pts">${scores[i]}</div>
      </div>`).join('')}
    <div class="bank-box">
      <div class="bank-lbl">البنك</div>
      <div class="bank-pts" id="bank-val">${GS.bank||0}</div>
    </div>`;

  // Round display — always use local QS count
  document.getElementById('round-disp').textContent =
    questions.length ? `${(GS.round||0)+1}/${questions.length}` : '—';

  // Question box
  const qbox = document.getElementById('q-box');
  const q = questions[GS.round||0];
  if(q && ph!=='setup'){
    qbox.style.display='';
    document.getElementById('q-text').textContent = q.q;
    const vis = GS.question_visible;
    document.getElementById('q-vis').textContent = vis?'👁 ظاهر للجمهور':'🙈 مخفي عن الجمهور';
    document.getElementById('toggle-q-btn').textContent = vis?'🙈 إخفاء':'👁 إظهار للجمهور';
  } else {
    qbox.style.display='none';
  }

  // Host board — show all answers (always visible to host)
  const board = document.getElementById('host-board');
  if(tiles.length && ph!=='setup'){
    board.style.gridTemplateColumns = tiles.length<=3?'1fr':'1fr 1fr';
    const b1i = GS.fo_buzzer?.answer_idx;
    const b2i = GS.fo_buzzer2?.answer_idx;
    board.innerHTML = tiles.map((t,i)=>{
      let cls='ht';
      if(t.revealed) cls+=' revealed';
      if(b1i===i||b2i===i) cls+=' fo-sel';
      const click = !t.revealed ? `onclick="send({type:'host_reveal_tile',idx:${i}})"` : '';
      return `<div class="${cls}" ${click}>
        <div class="ht-n">${i+1}</div>
        <div class="ht-txt">${esc(t.text)}</div>
        <div class="ht-pts">${t.pts}</div>
        ${b1i===i?'<span style="font-size:.6rem;color:#ff9800">B1</span>':''}
        ${b2i===i?'<span style="font-size:.6rem;color:#e040fb">B2</span>':''}
      </div>`;
    }).join('');
  } else {
    board.innerHTML='';
  }

  // Strikes
  const sr2 = document.getElementById('strikes-row');
  if(ph==='playing'||ph==='steal'){
    const max=GS.max_strikes||3, cur=GS.strikes||0;
    sr2.innerHTML=Array.from({length:max},(_,i)=>`<div class="sx${i<cur?' lit':''}">✕</div>`).join('');
  } else { sr2.innerHTML=''; }

  // Controls
  renderControls(ph, teams, questions);

  // Danger zone (cancel/reset) — show if game started
  const da = document.getElementById('danger-area');
  if(ph!=='setup'&&ph!=='game_over'){
    da.innerHTML=`<div class="danger">
      <div class="danger-title">⚠️ منطقة الخطر</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="cb cb-danger" onclick="if(confirm('إلغاء الجولة؟')){send({type:'host_cancel_game'});toast('تم الإلغاء')}">⏹ إلغاء الجولة</button>
        <button class="cb cb-danger" onclick="if(confirm('إعادة اللعبة كاملة؟ النقاط تُحذف!')){send({type:'host_reset_game'});toast('تمت الإعادة 🔄')}">🔄 إعادة كاملة</button>
      </div>
    </div>`;
  } else { da.innerHTML=''; }

  // Round buttons — always use LOCAL QS
  const rb = document.getElementById('round-btns');
  if(questions.length){
    rb.innerHTML = questions.map((_,i)=>
      `<button class="btn btn-sm ${i===(GS.round||0)?'btn-gold':'btn-ghost'}" onclick="loadRound(${i})">${i+1}</button>`
    ).join('');
  } else {
    rb.innerHTML='<span style="font-size:.78rem;color:var(--muted)">أضف أسئلة من تاب الأسئلة</span>';
  }
}

function renderControls(ph, teams, questions){
  const el = document.getElementById('ctrl-area');
  let html = '';

  if(ph==='setup'||!ph){
    const hasQ = questions.length > 0;
    html=`<div class="ctrl">
      <div class="ctrl-title">ابدأ اللعبة</div>
      <div class="ctrl-btns">
        <button class="cb cb-gold" onclick="loadRound(0)" ${!hasQ?'disabled style="opacity:.5;cursor:not-allowed"':''}>
          ${hasQ?'▶ ابدأ الجولة الأولى':'⚠️ أضف أسئلة أولاً'}
        </button>
        <button class="cb cb-gray" style="font-size:.74rem" onclick="if(confirm('مسح الجولة السابقة؟'))send({type:'host_reset_game'})">🗑 مسح السابقة</button>
      </div>
    </div>`;
  }

  else if(ph==='faceoff'){
    const buzzOpen=GS.fo_buzz_open, b1=GS.fo_buzzer, b2=GS.fo_buzzer2;
    const tiles=GS.board_tiles||[];

    html+=`<div class="ctrl">
      <div class="ctrl-title">المواجهة – تحكم الزر</div>
      <div class="ctrl-btns">
        ${buzzOpen
          ?`<button class="cb cb-gray" onclick="send({type:'host_close_buzz'})">🔒 أغلق الزر</button>`
          :`<button class="cb cb-accent" onclick="send({type:'host_open_buzz'})">🔓 افتح الزر للاعبين</button>`}
        <button class="cb cb-gray" onclick="send({type:'host_open_buzz'})">🔄 إعادة ضبط</button>
      </div>
    </div>`;

    if(b1){
      const b1done = b1.answer_idx !== null && b1.answer_idx !== undefined;
      html+=`<div class="fo-panel">
        <div class="ctrl-title">📍 ${esc(b1.name)} – ${esc(b1.team)}</div>
        <div class="fo-slot">
          <div class="fo-name"><div class="fo-dot" style="background:${b1.color}"></div>${esc(b1.name)} ${b1done?(b1.answer_idx===-1?'<span style="color:var(--red)">✕ خاطئة</span>':`<span style="color:var(--green)">✓ رقم ${b1.answer_idx+1}</span>`):'<span style="color:var(--muted);font-size:.72rem">لم يحدد بعد</span>'}</div>
          ${!b1done?`<div class="fo-btns">
            ${tiles.map((t,i)=>`<button class="fo-btn" onclick="send({type:'host_fo_answer',slot:1,tile_idx:${i}})">${i+1}. ${esc(t.text)} (${t.pts})</button>`).join('')}
            <button class="fo-btn wrong" onclick="send({type:'host_fo_answer',slot:1,tile_idx:null})">✕ خاطئة</button>
          </div>`:''}
        </div>`;

      if(b1done){
        const isTop = b1.answer_idx===0;
        if(isTop && b1.answer_idx!==-1){
          html+=`</div><div class="ctrl" style="border-color:rgba(255,204,0,.35)">
            <div class="ctrl-title" style="color:var(--gold)">🏆 رقم 1! – ${esc(teams[b1.team_idx]?.name)}</div>
            <div class="ctrl-btns">
              <button class="cb cb-green" onclick="send({type:'host_playpass',choice:'play'})">▶ Play</button>
              <button class="cb cb-orange" onclick="send({type:'host_playpass',choice:'pass'})">⏩ Pass</button>
            </div>
          </div>`;
        } else {
          // فرصة للاعب الثاني
          if(!b2){
            html+=`</div><div class="ctrl" style="border-color:rgba(124,106,250,.35)">
              <div class="ctrl-title">🎯 فرصة اللاعب الثاني</div>
              <div style="font-size:.78rem;color:var(--muted);margin-bottom:7px">${b1.answer_idx===-1?'أجاب خطأ':`أجاب رقم ${b1.answer_idx+1}`} – الفريق الآخر يحاول</div>
              <div class="ctrl-btns">
                <button class="cb cb-accent" onclick="send({type:'host_open_buzz'})">🔓 افتح الزر للاعب الثاني</button>
              </div>
            </div>`;
          } else {
            const b2done = b2.answer_idx !== null && b2.answer_idx !== undefined;
            html+=`
            <div class="fo-slot" style="margin-top:6px">
              <div class="fo-name"><div class="fo-dot" style="background:${b2.color}"></div>${esc(b2.name)} ${b2done?(b2.answer_idx===-1?'<span style="color:var(--red)">✕ خاطئة</span>':`<span style="color:var(--green)">✓ رقم ${b2.answer_idx+1}</span>`):'<span style="color:var(--muted);font-size:.72rem">لم يحدد بعد</span>'}</div>
              ${!b2done?`<div class="fo-btns">
                ${tiles.map((t,i)=>`<button class="fo-btn" onclick="send({type:'host_fo_answer',slot:2,tile_idx:${i}})">${i+1}. ${esc(t.text)} (${t.pts})</button>`).join('')}
                <button class="fo-btn wrong" onclick="send({type:'host_fo_answer',slot:2,tile_idx:null})">✕ خاطئة</button>
              </div>`:''}
            </div></div>`;
            if(b2done){
              const b1a=b1.answer_idx, b2a=b2.answer_idx;
              let wi, reason;
              if(b1a===-1&&b2a===-1){ wi=-1; reason='كلاهما أخطأ'; }
              else if(b1a===-1){ wi=b2.team_idx; reason=`فاز ${esc(teams[b2.team_idx]?.name)}`; }
              else if(b2a===-1){ wi=b1.team_idx; reason=`فاز ${esc(teams[b1.team_idx]?.name)}`; }
              else if(b1a<=b2a){ wi=b1.team_idx; reason=`رقم ${b1a+1} أعلى → فاز ${esc(teams[b1.team_idx]?.name)}`; }
              else { wi=b2.team_idx; reason=`رقم ${b2a+1} أعلى → فاز ${esc(teams[b2.team_idx]?.name)}`; }

              if(wi===-1){
                html+=`<div class="ctrl"><div class="ctrl-title">كلاهما أخطأ – اختر يدوياً</div>
                  <div class="ctrl-btns">${teams.map((t,i)=>`<button class="cb cb-blue" style="border-color:${t.color}" onclick="send({type:'host_skip_fo',team_idx:${i}})">دور ${esc(t.name)}</button>`).join('')}</div></div>`;
              } else {
                const wn=esc(teams[wi]?.name||'—');
                html+=`<div class="ctrl" style="border-color:rgba(255,204,0,.35)">
                  <div class="ctrl-title" style="color:var(--gold)">🏆 ${reason}</div>
                  <div class="ctrl-btns">
                    <button class="cb cb-green" onclick="send({type:'host_playpass',choice:'play'})">▶ Play – ${wn}</button>
                    <button class="cb cb-orange" onclick="send({type:'host_playpass',choice:'pass'})">⏩ Pass</button>
                  </div></div>`;
              }
            }
          }
        }
      } else { html+='</div>'; }
    }

    html+=`<div class="ctrl" style="margin-top:4px">
      <div class="ctrl-title" style="font-size:.62rem">تخطي يدوي</div>
      <div class="ctrl-btns">${teams.map((t,i)=>`<button class="cb cb-blue btn-sm" style="border-color:${t.color};font-size:.74rem" onclick="send({type:'host_skip_fo',team_idx:${i}})">دور ${esc(t.name)}</button>`).join('')}</div>
    </div>`;
  }

  else if(ph==='playpass'){
    const wi=GS.fo_winner_idx??0, wn=esc(teams[wi]?.name||'—');
    html=`<div class="ctrl" style="border-color:rgba(255,204,0,.35)">
      <div class="ctrl-title" style="color:var(--gold)">🏆 الفائز: ${wn}</div>
      <div class="ctrl-btns">
        <button class="cb cb-green" onclick="send({type:'host_playpass',choice:'play'})">▶ Play – يلعب ${wn}</button>
        <button class="cb cb-orange" onclick="send({type:'host_playpass',choice:'pass'})">⏩ Pass – يمرر</button>
      </div></div>`;
  }

  else if(ph==='playing'){
    const at=GS.active_team||0, tc=teams[at]?.color||'var(--gold)', tn=esc(teams[at]?.name||'—');
    html=`<div class="ctrl">
      <div class="ctrl-title">يلعب الآن: <span style="color:${tc}">${tn}</span></div>
      <div style="font-size:.76rem;color:var(--muted);margin-bottom:7px">اضغط على إجابة في اللوحة لكشفها، أو اضغط خطأ</div>
      <div class="ctrl-btns">
        <button class="cb cb-red" onclick="send({type:'host_strike'})">✕ إجابة خاطئة</button>
        <button class="cb cb-gray" onclick="send({type:'host_reveal_all'})">👁 كشف الكل</button>
        <button class="cb cb-green" onclick="send({type:'host_end_round'})">✅ انتهت الجولة</button>
      </div></div>`;
  }

  else if(ph==='steal'){
    const st=GS.steal_team??1, stn=esc(teams[st]?.name||'—'), orig=esc(teams[1-st]?.name||'—');
    html=`<div class="ctrl" style="border-color:rgba(229,57,53,.35)">
      <div class="ctrl-title" style="color:var(--red)">🎯 السرقة – ${stn}</div>
      <div class="ctrl-btns">
        <button class="cb cb-green" onclick="send({type:'host_steal_result',correct:true})">✅ صحيحة – يسرق ${stn}</button>
        <button class="cb cb-red" onclick="send({type:'host_steal_result',correct:false})">✕ خاطئة – لـ ${orig}</button>
      </div></div>`;
  }

  else if(ph==='end_round'){
    const total=questions.length, isLast=(GS.round||0)+1>=total;
    html=`<div class="ctrl">
      <div class="ctrl-title">نهاية الجولة</div>
      <div class="ctrl-btns">
        <button class="cb cb-gray" onclick="send({type:'host_reveal_all'})">👁 كشف المتبقي</button>
        <button class="cb cb-gold" onclick="send({type:'host_next_round'})">${isLast?'🏁 نهاية اللعبة':'الجولة التالية ›'}</button>
      </div></div>`;
  }

  else if(ph==='game_over'){
    html=`<div class="ctrl" style="border-color:rgba(255,204,0,.3)">
      <div class="ctrl-title" style="color:var(--gold)">🏆 انتهت اللعبة!</div>
      <div class="ctrl-btns">
        <button class="cb cb-gold" onclick="if(confirm('لعبة جديدة؟'))send({type:'host_reset_game'})">🔄 لعبة جديدة</button>
      </div></div>`;
  }

  el.innerHTML = html;
}

function renderPlayers(players){
  document.getElementById('pl-count').textContent=players.length;
  const el=document.getElementById('pl-list');
  if(!players.length){
    el.innerHTML='<div style="font-size:.78rem;color:var(--muted);text-align:center;padding:10px;margin-top:5px">لا يوجد لاعبون</div>';
    return;
  }
  el.innerHTML=players.map(p=>`<div class="pl-item">
    <div class="pl-dot" style="background:${p.color}"></div>
    <div class="pl-name">${esc(p.name)}</div>
    <div class="pl-team">${esc(p.team)}</div>
  </div>`).join('');
}

// ══════════════════════════════════════
// GAME ACTIONS
// ══════════════════════════════════════
function loadRound(r){
  if(!QS.length){ toast('أضف أسئلة أولاً','err'); return; }
  send({type:'host_load_round', round:r, questions:QS});
}

// ══════════════════════════════════════
// QUESTIONS CRUD
// ══════════════════════════════════════
function renderQList(){
  const el=document.getElementById('q-items');
  document.getElementById('q-count').textContent=QS.length;
  el.innerHTML='';
  QS.forEach((q,i)=>{
    const d=document.createElement('div');
    d.className='q-item'+(i===selQ?' sel':'');
    d.innerHTML=`<div class="qi-n">${i+1}</div><div class="qi-txt">${esc(q.q)||'بدون نص'}</div><button class="qi-del" onclick="delQ(event,${i})">✕</button>`;
    d.onclick=e=>{if(!e.target.classList.contains('qi-del')){selQ=i;renderQList();renderEditor(i);}};
    el.appendChild(d);
  });
  // Update round buttons if game tab visible
  if(GS) renderGame();
}

function addQ(){
  QS.push({q:'',answers:[{t:'',p:40},{t:'',p:30},{t:'',p:20},{t:'',p:10}]});
  selQ=QS.length-1; saveData(); renderQList(); renderEditor(selQ);
}
function delQ(e,i){
  e.stopPropagation(); if(!confirm('حذف؟'))return;
  QS.splice(i,1); selQ=Math.min(selQ,QS.length-1); saveData(); renderQList();
  if(QS.length) renderEditor(selQ);
  else document.getElementById('q-editor').innerHTML='<div style="height:140px;display:flex;align-items:center;justify-content:center;color:var(--muted)">لا توجد أسئلة</div>';
}
function renderEditor(i){
  const q=QS[i];
  document.getElementById('q-editor').innerHTML=`
    <div class="card">
      <label style="font-size:.67rem;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;display:block;margin-bottom:6px">نص السؤال</label>
      <input class="einput" id="ed-q" placeholder="مثال: سمّوا شيئاً في المطبخ؟" value="${esc(q.q)}" oninput="QS[selQ].q=this.value;renderQList()">
    </div>
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:9px">
        <span style="font-size:.7rem;font-weight:700;color:var(--gold)">الإجابات والنقاط</span>
        <span style="font-size:.67rem;color:var(--muted)">المجموع المثالي = 100</span>
      </div>
      <div id="ans-rows"></div>
      <button style="width:100%;background:rgba(255,255,255,.03);border:1px dashed rgba(255,255,255,.1);color:var(--muted);border-radius:7px;padding:7px;font-size:.76rem;margin-top:4px" onclick="addAns()">＋ إجابة</button>
      <div class="pts-bar"><span style="color:var(--muted)">المجموع:</span><span class="pv" id="pv">0</span></div>
    </div>
    <button class="save-btn" onclick="saveQ()">💾 حفظ وإرسال للسيرفر</button>`;
  renderAns();
}
function renderAns(){
  const q=QS[selQ], c=document.getElementById('ans-rows'); if(!c)return; c.innerHTML='';
  q.answers.forEach((a,i)=>{
    const r=document.createElement('div'); r.className='ans-row';
    r.innerHTML=`<div class="ans-n">${i+1}</div>
      <input class="einput" placeholder="نص الإجابة" value="${esc(a.t)}" oninput="QS[selQ].answers[${i}].t=this.value">
      <input class="einput pts-inp" type="number" min="1" max="99" value="${a.p}" oninput="QS[selQ].answers[${i}].p=parseInt(this.value)||0;updatePts()">
      <button class="ans-del" onclick="delAns(${i})">✕</button>`;
    c.appendChild(r);
  }); updatePts();
}
function addAns(){ if(QS[selQ].answers.length>=8){toast('الحد 8','err');return} QS[selQ].answers.push({t:'',p:5}); renderAns(); }
function delAns(i){ if(QS[selQ].answers.length<=2){toast('يجب إجابتان','err');return} QS[selQ].answers.splice(i,1); renderAns(); }
function updatePts(){
  const s=QS[selQ].answers.reduce((a,b)=>a+(parseInt(b.p)||0),0);
  const el=document.getElementById('pv'); if(!el)return;
  el.textContent=s; el.className='pv '+(s===100?'ok':s>100?'over':'warn');
}
function saveQ(){
  if(!QS[selQ].q.trim()){toast('أدخل نص السؤال','err');return}
  if(QS[selQ].answers.some(a=>!a.t.trim())){toast('إجابات فارغة','err');return}
  saveData(); send({type:'host_set_questions',questions:QS}); toast('تم الحفظ والإرسال ✓');
}

// ══════════════════════════════════════
// TEAMS
// ══════════════════════════════════════
function renderTeamsGrid(){
  const el=document.getElementById('teams-grid'); el.innerHTML='';
  TEAMS.forEach((t,i)=>{
    const c=document.createElement('div'); c.className='te';
    c.innerHTML=`<div class="te-head">
      <input type="color" class="te-color" value="${t.color}" style="background:${t.color}" oninput="TEAMS[${i}].color=this.value;this.style.background=this.value">
      <input class="te-name" value="${esc(t.name)}" oninput="TEAMS[${i}].name=this.value">
      <span style="font-size:.7rem;color:var(--muted)">${(GS?.scores||[0,0])[i]} نقطة</span>
    </div>`;
    el.appendChild(c);
  });
}
function saveTeams(){ saveData(); send({type:'host_set_teams',teams:TEAMS}); toast('تم حفظ الفرق ✓'); }

// ══════════════════════════════════════
// SETTINGS
// ══════════════════════════════════════
function setTheme(name){
  CFG.theme=name; document.body.setAttribute('data-theme',name);
  saveData(); send({type:'host_set_theme',theme:name});
}

// ══════════════════════════════════════
// DATA
// ══════════════════════════════════════
function saveData(){
  localStorage.setItem('ff_cfg',  JSON.stringify(CFG));
  localStorage.setItem('ff_qs',   JSON.stringify(QS));
  localStorage.setItem('ff_teams',JSON.stringify(TEAMS));
}
function exportJSON(){
  const b=new Blob([JSON.stringify({questions:QS,teams:TEAMS,config:CFG},null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='family-feud.json'; a.click();
  toast('تم التصدير 📤');
}
function importJSON(){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='.json';
  inp.onchange=e=>{
    const r=new FileReader();
    r.onload=ev=>{try{
      const d=JSON.parse(ev.target.result);
      if(d.questions)QS=d.questions;
      if(d.teams)TEAMS=d.teams;
      if(d.config)CFG={...CFG,...d.config};
      selQ=0; saveData(); init(); syncToServer(); toast('تم الاستيراد ✓');
    }catch{toast('ملف غير صالح','err')}};
    r.readAsText(e.target.files[0]);
  }; inp.click();
}

// ══════════════════════════════════════
// UTILS
// ══════════════════════════════════════
let _t=null;
function toast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast on'+(type?' '+type:'');
  clearTimeout(_t); _t=setTimeout(()=>t.classList.remove('on'),2400);
}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;')}

// ══════════════════════════════════════
// INIT
// ══════════════════════════════════════
function init(){
  document.body.setAttribute('data-theme',CFG.theme||'classic');
  document.getElementById('share-url').textContent=location.origin+'/buzz.html';
  document.getElementById('tog-sounds').classList.toggle('on',CFG.soundEnabled);
  renderQList();
  if(QS.length) renderEditor(selQ);
  renderTeamsGrid();
  // Show initial state without server
  renderGame();
}

init();
connect();

// Polling للاعبين كل 5 ثواني
setInterval(()=>{ send({type:'get_players'}); }, 5000);
</script>
</body>
</html>
